:root{

  --blue:#4D79FF;--blue2:#2B53D5;
  --gold:#DDA93B;--gold2:#A87820;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg0);}
body{font-family:'Outfit',sans-serif;color:var(--t1);font-size:14px;}
::-webkit-scrollbar{width:0;}
#app{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg0);}
.hdr{flex-shrink:0;background:linear-gradient(180deg,#101535,var(--bg0));border-bottom:1px solid var(--bd2);padding:11px 16px 10px;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.32;}
.hrow{display:flex;align-items:center;gap:9px;}
.hlogo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:var(--gb);flex-shrink:0;}
.htit{font-size:14px;font-weight:800;color:var(--t1);}
.htit span{color:var(--blue);}
.hsub{font-size:8.5px;color:var(--t3);margin-top:1px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;}
.hright{margin-left:auto;display:flex;gap:5px;align-items:center;}
.hbtn{cursor:pointer;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--t3);font-weight:600;transition:all .2s;white-space:nowrap;}
.hbtn.on{border-color:rgba(77,121,255,.5);color:var(--blue);background:rgba(77,121,255,.12);}
.hbadge{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:4px 9px;font-size:11px;color:var(--t2);font-weight:600;}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;}
.nav{flex-shrink:0;background:var(--bg1);border-top:1px solid var(--bd2);display:flex;padding:0 2px;position:relative;}
.nav::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.18;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:10px 1px 13px;color:var(--t3);position:relative;transition:color .2s;}
.nb.on{color:var(--blue);}

.nb-l{font-size:7.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.pad{padding:13px 15px;}
.stl{font-size:9.5px;font-weight:700;color:var(--t3);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.stl::after{content:'';flex:1;height:1px;background:var(--bd3);}

.card2{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd3);}
.row:last-child{border-bottom:none;}
.div{height:1px;background:var(--bd2);margin:11px 0;}

.mv{font-size:19px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.ml{font-size:8.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

.stab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bd2);font-size:11px;font-weight:600;cursor:pointer;color:var(--t3);background:transparent;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap;}

.sb{border-radius:var(--rs);padding:9px 6px;cursor:pointer;text-align:center;border:1.5px solid var(--bd2);background:var(--bg2);color:var(--t2);transition:all .2s;}

.emp{text-align:center;padding:36px 20px;}

.emp-t{color:var(--t3);font-size:12.5px;margin-bottom:16px;line-height:1.65;}

input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bg3);outline:none;cursor:pointer;margin:3px 0 10px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 6px rgba(77,121,255,.5);}
.plan{border-radius:16px;padding:16px;margin-bottom:12px;border:1.5px solid var(--bd2);background:var(--bg2);position:relative;overflow:hidden;}
.plan.pro{border-color:rgba(77,121,255,.45);background:linear-gradient(135deg,rgba(77,121,255,.1),rgba(77,121,255,.04));}
.plan.prem{border-color:rgba(221,169,59,.4);background:linear-gradient(135deg,rgba(221,169,59,.09),rgba(221,169,59,.03));}
.plan.elite{border-color:rgba(139,111,240,.45);background:linear-gradient(135deg,rgba(139,111,240,.1),rgba(139,111,240,.04));}
.plan-badge{position:absolute;top:13px;right:13px;font-size:8px;font-weight:800;border-radius:4px;padding:3px 8px;text-transform:uppercase;}
.pln{font-size:17px;font-weight:800;margin-bottom:2px;}
.plp{font-size:11px;color:var(--t3);margin-bottom:4px;}
.plprice{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.plprice-usd{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;}
.plars{font-size:11px;color:var(--t2);margin-bottom:10px;font-family:'JetBrains Mono',monospace;}
.plf{font-size:11px;color:var(--t2);margin-bottom:4px;display:flex;gap:6px;line-height:1.4;}
.plf.y{color:var(--t1);}
.notif{border-radius:var(--rs);padding:9px 11px;margin-bottom:6px;display:flex;gap:9px;align-items:center;background:var(--bg2);border:1px solid var(--bd2);}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.leg{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.sc-c{border-radius:var(--r);padding:11px 12px;border:1.5px solid var(--bd2);background:var(--bg2);margin-bottom:7px;cursor:pointer;transition:all .2s;}
.sc-c.on{border-color:rgba(77,121,255,.42);background:rgba(77,121,255,.12);}
.cbb{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px;}
.cbf{height:100%;border-radius:4px;transition:width .5s;}
.bench{border-radius:var(--rs);padding:9px 12px;margin-bottom:6px;background:var(--bg1);border:1px solid var(--bd2);}
.bench-row{display:flex;justify-content:space-between;align-items:center;}
select option{background:var(--bg2);color:var(--t1);}
</style>

    const W=cv.parentElement.clientWidth||310,H=82;cv.width=W;cv.height=H;
    const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
    const ctx=cv.getContext("2d");ctx.clearRect(0,0,W,H);
    const pts=data.map((v,i)=>({x:i*(W-20)/(data.length-1)+10,y:H-14-(((v-mn)/rng)*(H-28)+4)}));
    const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,color+"44");gr.addColorStop(1,color+"00");
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,H-4);ctx.lineTo(pts[0].x,H-4);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.lineCap="round";ctx.stroke();
    const l=pts[pts.length-1];
    ctx.beginPath();ctx.arc(l.x,l.y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(l.x,l.y,6,0,Math.PI*2);ctx.strokeStyle=color+"55";ctx.lineWidth=2;ctx.stroke();
    ctx.font="500 7.5px 'JetBrains Mono',monospace";ctx.fillStyle="#3C4F70";ctx.textAlign="center";
    const step=Math.round((labels.length-1)/3);
    [0,step,step*2,labels.length-1].forEach(i=>{if(labels[i]&&pts[i])ctx.fillText(labels[i],pts[i].x,H-1);});
  },60);
}

function calcSim(){
  const{costo,markup,infl,meses}=S.sim;
  const p0=costo*(1+markup/100),cF=costo*Math.pow(1+infl/100,meses);
  const m0=(p0-costo)/p0*100,mF=(p0-cF)/p0*100,pN=cF/(1-markup/100);
  return{p0,cF,m0,mF,pN,adj:(pN-p0)/p0*100,loss:m0-mF};
}

}

    <button class="btn btn-b" style="margin-top:4px" onclick="gScen()">${S.ld?"⚙️ Analizando...":"🤖&nbsp; Analizar Impacto con IA"}</button>
    ${S.ld?`<div class="spw" style="padding:22px 0"><div class="sp">🔮</div><div class="sp-t">Proyectando escenario...</div></div>`:""}
    </div>`;
  }
  if(S.ld)return `<div class="spw"><div class="sp">🎯</div><div class="sp-t">Elaborando plan de acción...</div></div>`;
  if(S.sol)return `<div class="pad">${stabs}<div style="background:linear-gradient(135deg,rgba(77,121,255,.13),rgba(77,121,255,.05));border:1px solid rgba(77,121,255,.22);border-radius:var(--r);padding:12px 14px;margin-bottom:12px"><div style="font-size:9px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Plan de Acción · PyMEdata</div><div style="font-weight:800;font-size:15px">${se?.e} ${se?.l}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">Mayo 2026 · Framework FCE-UNLP · Fernando Toledo</div></div><div class="aib">${S.sol}</div><div class="btn-row"><button class="btn btn-o" onclick="set({sol:null});gSol()">🔄 Regenerar</button><button class="btn btn-b" onclick="set({sc:'monitor',stab:'alertas'})">Monitor →</button></div></div>`;
  return `<div class="pad">${stabs}<div class="emp"><div class="emp-i">🎯</div><div class="emp-t">${S.diag?"Tu diagnóstico está listo.\nGenerá el plan de acción.":"Primero configurá tu perfil\ny generá el diagnóstico."}</div>${S.diag?`<button class="btn btn-g" onclick="gSol()">Generar Plan de Acción</button>`:`<button class="btn btn-o" onclick="set({sc:'perfil',stab:''})">Ir al Perfil</button>`}</div></div>`;
}

function pgMon(){
  if(!["alertas","vencimientos","kpis","fuentes"].includes(S.stab))Object.assign(S,{stab:"alertas"});
  const stabs=`<div class="stabs">${[["alertas","Alertas"],["vencimientos","Vencimientos"],["kpis","KPIs"],["fuentes","Fuentes"]].map(([id,l])=>`<button class="stab ${S.stab===id?"on":""}" onclick="set({stab:'${id}'})">${l}</button>`).join("")}</div>`;
  const ALS=[{n:"am",i:"📅",ti:"IPC Abril 2026",tx:"Publicación: 14 de mayo (INDEC). Mayorista ~0.8–1%/mes. Evaluá trasladabilidad.",sr:"INDEC"},{n:"am",i:"💱",ti:"Tipo de Cambio",tx:"TC $1.429/USD (mar/26). Proyec. dic/26: $1.707. Depreciación esperada: +19.4%.",sr:"BCRA/REM"},{n:S.im||S.us?"red":"vd",i:"📦",ti:"Insumos Importados",tx:S.im||S.us?"⚠️ Exposición cambiaria alta en tu perfil. Seguí el TC mayorista a diario.":"Riesgo bajo: sin exposición importadora directa en tu perfil.",sr:"BCRA"},{n:"vd",i:"🏦",ti:"Crédito PyME",tx:"TAMAR: 30.9% TNA → 24.2% proyectada dic/26. Ventana de financiamiento en apertura.",sr:"REM-BCRA"},{n:"vd",i:"📊",ti:"Actividad",tx:"PIB +3.4% proyectado. Salarios reales en recuperación. Demanda en alza.",sr:"REM-BCRA"},{n:"am",i:"⚖️",ti:"Agenda Fiscal",tx:"Verificá IIBB (ARBA) y tasas municipales. Presión en cascada sobre márgenes.",sr:"ARBA/AFIP"}];
  let b="";
  if(S.stab==="alertas")b=ALS.map(a=>alC(a.n,a.i,a.ti,a.tx,a.sr)).join("");
  else if(S.stab==="vencimientos")b=VENC.map(v=>{const c=v.u==="red"?"#EF4F4F":"#F09730";return `<div class="notif"><div class="ndot" style="background:${c};box-shadow:0 0 5px ${c}44;flex-shrink:0"></div><div style="font-size:11px;color:var(--t2);flex:1;line-height:1.4"><b style="color:var(--t1)">${v.c}</b> — ${v.t}</div><div style="font-size:10px;font-weight:700;color:${c};white-space:nowrap">${v.d}</div></div>`;}).join("");
  else if(S.stab==="kpis")b=KPI.map(k=>`<div class="card kc"><div class="kci" style="background:${k.c}18;border:1px solid ${k.c}30">${k.i}</div><div><div style="font-weight:700;font-size:13px;color:${k.c}">${k.l}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${k.d}</div></div></div>`).join("");
  else b=[["📊","INDEC","Inflación, PIB, actividad","indec.gob.ar"],["🏦","BCRA","Tipo de cambio, tasas","bcra.gob.ar"],["📋","ARBA","Ingresos Brutos PBA","arba.gob.ar"],["📁","AFIP","Obligaciones fiscales","afip.gob.ar"],["💼","SEPyME","Programas y créditos","argentina.gob.ar/sepyme"],["🏦","Bco. Provincia","Líneas PyME PBA","bancobapro.com.ar"]].map(([e,n,d,u])=>`<div class="card" style="display:flex;align-items:center;gap:11px;margin-bottom:6px"><span style="font-size:16px">${e}</span><div><div style="font-size:12px;font-weight:700">${n} <span style="font-weight:400;color:var(--t3);font-size:11px">— ${d}</span></div><div style="font-size:9px;color:var(--t3);margin-top:2px;font-family:'JetBrains Mono',monospace">${u}</div></div></div>`).join("");
  return `<div class="pad">${stabs}${b}</div>`;
}

const HDR={inicio:{t:"Tablero",s:"CONTEXTO MACRO · MAYO 2026"},perfil:{t:"Mi Empresa",s:"PERFIL EMPRESARIAL"},diagnostico:{t:"Diagnóstico",s:"CANALES · ANÁLISIS · COMPARADOR"},soluciones:{t:"Soluciones",s:"PLAN · SIMULADOR · ESCENARIOS"},monitor:{t:"Monitor",s:"ALERTAS · VENCIMIENTOS · KPIs"},tarifas:{t:"Planes",s:"PRECIOS · PYMEDATA"},legal:{t:"Legal",s:"FERNANDO TOLEDO · FCE-UNLP"}};
const NAV=[{id:"inicio",l:"Inicio",e:"🏠"},{id:"perfil",l:"Perfil",e:"🏢"},{id:"diagnostico",l:"Diagnóst.",e:"🔍"},{id:"soluciones",l:"Soluciones",e:"🎯"},{id:"monitor",l:"Monitor",e:"🔔"}];
const PG={inicio:pgInicio,perfil:pgPerfil,diagnostico:pgDiag,soluciones:pgSol,monitor:pgMon,tarifas:pgTarifas,legal:pgLegal};

function navTo(id){
  if((id==="diagnostico"||id==="soluciones")&&!S.ok)set({sc:"perfil",stab:""});
  else set({sc:id,stab:""});
}

function R(){
  const h=HDR[S.sc]||HDR.inicio;
  document.getElementById("ht").innerHTML=`PyME<span style="color:var(--blue)">data</span> <span style="font-size:11px;font-weight:500;color:var(--t3)">· ${h.t}</span>`;
  document.getElementById("hs").textContent=h.s;
  const se=SEC.find(x=>x.id===S.sector);
  const extra=[{id:"tarifas",e:"💎",l:"Planes"},{id:"legal",e:"⚖️",l:"Legal"}];
  document.getElementById("hright").innerHTML=
    `${S.ok&&se?`<div class="hbadge">${se.e} ${se.l.split("/")[0].trim()}</div>`:``}
     ${extra.map(x=>`<div class="hbtn ${S.sc===x.id?"on":""}" onclick="set({sc:'${x.id}',stab:''})">${x.e} ${x.l}</div>`).join("")}
     <a href="index.html" class="hbtn" style="text-decoration:none">🏠</a>`;
  document.getElementById("scr").innerHTML=(PG[S.sc]||pgInicio)();
  document.getElementById("nav").innerHTML=NAV.map(it=>`<button class="nb ${S.sc===it.id?"on":""}" onclick="navTo('${it.id}')"><span class="nb-i">${it.e}</span><span class="nb-l">${it.l}</span></button>`).join("");
  if(S.sc==="inicio"){const sr=SER[S.cs];drawChart("mc",sr.d,sr.c,sr.lbl);}
}

}
