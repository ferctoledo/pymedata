<style>
:root{
  --bg0:#05071A;--bg1:#0A0E24;--bg2:#0F152E;--bg3:#162040;
  --blue:#4D79FF;--blue2:#2B53D5;
  --gold:#DDA93B;--gold2:#A87820;
  --green:#1EC96A;--red:#EF4F4F;--amber:#F09730;--purple:#8B6FF0;--cyan:#27C3F0;
  --t1:#EFF3FF;--t2:#7A8FBA;--t3:#3C4F70;
  --bd:rgba(77,121,255,.1);--bd2:rgba(255,255,255,.055);--bd3:rgba(255,255,255,.025);
  --r:13px;--rs:8px;
  --gb:0 4px 22px rgba(77,121,255,.22);--gg:0 4px 20px rgba(221,169,59,.2);--sh:0 2px 12px rgba(0,0,0,.38);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg0);}
body{font-family:'Outfit',sans-serif;color:var(--t1);font-size:14px;}
::-webkit-scrollbar{width:0;}
#app{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000;}
#splash .sp-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:var(--gb);}
#splash .sp-txt{font-size:24px;font-weight:800;}
#splash .sp-txt span{color:var(--blue);}
#splash .sp-ring{width:36px;height:36px;border:3px solid rgba(77,121,255,.2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
.hdr{flex-shrink:0;background:linear-gradient(180deg,#101535,var(--bg0));border-bottom:1px solid var(--bd2);padding:11px 15px 10px;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.3;}
.hrow{display:flex;align-items:center;gap:9px;}
.hlogo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:var(--gb);flex-shrink:0;}
.htit{font-size:14px;font-weight:800;}
.htit span{color:var(--blue);}
.hsub{font-size:8.5px;color:var(--t3);margin-top:1px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.hright{margin-left:auto;display:flex;gap:5px;align-items:center;}
.hbtn{cursor:pointer;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--t3);font-weight:600;transition:all .2s;white-space:nowrap;}
.hbtn.on{border-color:rgba(77,121,255,.5);color:var(--blue);background:rgba(77,121,255,.12);}
.hbadge{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:4px 9px;font-size:11px;font-weight:600;}
.plan-chip{border-radius:5px;padding:2px 7px;font-size:9.5px;font-weight:700;}

/* NAV */
.scr{flex:1;overflow-y:auto;overflow-x:hidden;}
.nav{flex-shrink:0;background:var(--bg1);border-top:1px solid var(--bd2);display:flex;padding:0 2px;position:relative;}
.nav::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.18;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:10px 1px 13px;color:var(--t3);position:relative;transition:color .2s;}
.nb.on{color:var(--blue);}
.nb.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:2px;background:var(--blue);border-radius:0 0 3px 3px;}
.nb-i{font-size:19px;line-height:1;}
.nb-l{font-size:7.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}

/* LAYOUT */
.pad{padding:13px 15px;}
.stl{font-size:9.5px;font-weight:700;color:var(--t3);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.stl::after{content:'';flex:1;height:1px;background:var(--bd3);}
.card{background:var(--bg1);border:1px solid var(--bd2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);}
.card2{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd3);}
.row:last-child{border-bottom:none;}
.mc{border-radius:var(--r);padding:11px 12px;background:linear-gradient(135deg,var(--bg2),var(--bg1));box-shadow:var(--sh);}
.mv{font-size:19px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.ml{font-size:8.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.mm{font-size:8px;color:var(--t3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.hero{background:linear-gradient(150deg,#0B1736,#0C1227 55%,#0F1730);padding:14px 15px 13px;border-bottom:1px solid var(--bd2);}
.hero-top{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.hero-ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1D3A9D,var(--blue));display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:var(--gb);flex-shrink:0;}
.ticker{background:rgba(221,169,59,.1);border:1px solid rgba(221,169,59,.2);border-radius:9px;padding:8px 11px;font-size:11px;color:#F5C768;display:flex;align-items:flex-start;gap:7px;line-height:1.45;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:3px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 4px var(--gold);}50%{opacity:.2;box-shadow:none;}}
.tag{display:inline-flex;border-radius:4px;padding:2px 7px;font-size:9.5px;font-weight:700;}
.tagd{display:inline-flex;border-radius:4px;padding:2px 6px;font-size:9.5px;font-weight:700;background:rgba(60,79,112,.2);border:1px solid rgba(60,79,112,.3);color:var(--t3);}
.btn{display:block;width:100%;padding:12px;border-radius:var(--r);border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.97);}
.btn-b{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;box-shadow:var(--gb);}
.btn-g{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#09090E;box-shadow:var(--gg);}
.btn-o{background:transparent;color:var(--blue);border:1.5px solid rgba(77,121,255,.3)!important;}
.btn-r{background:linear-gradient(135deg,#A01515,var(--red));color:#fff;}
.btn-row{display:flex;gap:7px;}.btn-row .btn{flex:1;}
.al{border-radius:var(--rs);padding:10px 12px;margin-bottom:7px;display:flex;gap:9px;}
.al-d{font-size:11px;color:var(--t2);line-height:1.5;}
.cc{border-radius:var(--r);padding:12px;margin-bottom:8px;border:1.5px solid transparent;}
.cc-h{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.cc-ic{width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.stabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;}
.stabs::-webkit-scrollbar{height:0;}
.stab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bd2);font-size:11px;font-weight:600;cursor:pointer;color:var(--t3);background:transparent;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap;}
.stab.on{border-color:rgba(77,121,255,.4);background:rgba(77,121,255,.14);color:var(--blue);}
.sgr{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:13px;}
.sb{border-radius:var(--rs);padding:9px 6px;cursor:pointer;text-align:center;border:1.5px solid var(--bd2);background:var(--bg2);color:var(--t2);transition:all .2s;}
.sb.on{border-color:var(--blue);background:rgba(77,121,255,.15);color:var(--t1);}
.sb-i{font-size:19px;margin-bottom:3px;}
.sb-l{font-size:10px;font-weight:600;line-height:1.2;}
.tg{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;margin-right:5px;margin-bottom:5px;border:1.5px solid var(--bd2);background:var(--bg2);color:var(--t3);transition:all .2s;font-family:'Outfit',sans-serif;}
.tg.on{border-color:rgba(77,121,255,.4);background:rgba(77,121,255,.13);color:var(--blue);}
.inp{width:100%;background:var(--bg2);border:1.5px solid var(--bd2);border-radius:var(--r);color:var(--t1);font-size:13px;padding:10px 13px;outline:none;font-family:'Outfit',sans-serif;resize:none;transition:border-color .2s;}
.inp:focus{border-color:rgba(77,121,255,.38);}
.sel{width:100%;background:var(--bg2);border:1.5px solid var(--bd2);border-radius:var(--r);color:var(--t1);font-size:13px;padding:10px 13px;outline:none;cursor:pointer;margin-bottom:10px;appearance:none;font-family:'Outfit',sans-serif;}
.lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px;display:block;}
.aib{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;line-height:1.72;font-size:12.5px;color:var(--t2);white-space:pre-wrap;margin-bottom:10px;}
.spw{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px;}
.sp{font-size:34px;animation:spin 1.7s linear infinite;}
.sp-t{font-size:12.5px;color:var(--t3);}
.emp{text-align:center;padding:36px 20px;}
.emp-i{font-size:44px;margin-bottom:12px;}
.emp-t{color:var(--t3);font-size:12.5px;margin-bottom:16px;line-height:1.65;}
.kc{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.kci{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rv{font-size:11px;color:var(--t2);margin-bottom:3px;display:flex;justify-content:space-between;}
.rv b{color:var(--t1);}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bg3);outline:none;cursor:pointer;margin:3px 0 10px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 6px rgba(77,121,255,.5);}
.notif{border-radius:var(--rs);padding:9px 11px;margin-bottom:6px;display:flex;gap:9px;align-items:center;background:var(--bg2);border:1px solid var(--bd2);}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.leg{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.sc-c{border-radius:var(--r);padding:11px 12px;border:1.5px solid var(--bd2);background:var(--bg2);margin-bottom:7px;cursor:pointer;transition:all .2s;}
.sc-c.on{border-color:rgba(77,121,255,.42);background:rgba(77,121,255,.12);}
.cbb{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px;}
.cbf{height:100%;border-radius:4px;transition:width .5s;}
/* LOCK overlay */
.lock-overlay{position:absolute;inset:0;background:rgba(5,7,26,.85);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:10;backdrop-filter:blur(4px);}
.lock-ico{font-size:28px;}
.lock-txt{font-size:12px;color:var(--t2);text-align:center;max-width:200px;line-height:1.5;}
.lock-btn{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}
/* USO BAR */
.uso-bar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-top:4px;}
.uso-fill{height:100%;border-radius:2px;transition:width .5s;}
select option{background:var(--bg2);color:var(--t1);}
</style>
</head>

/* ══ AUTH ══ */
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  USER = session.user;

  // Cargar perfil
  const { data: profile } = await sb.from('profiles').select('*').eq('id', USER.id).single();
  PROFILE = profile;

  /* ── ADMIN OVERRIDE · Fernando Toledo · Dueño de PyMEdata ──────────────

function alC(n,i,ti,tx,sr){

function drawChart(id,data,color,labels){
  setTimeout(()=>{
    const cv=document.getElementById(id);if(!cv)return;
    const W=cv.parentElement.clientWidth||310,H=82;cv.width=W;cv.height=H;
    const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
    const ctx=cv.getContext("2d");ctx.clearRect(0,0,W,H);
    const pts=data.map((v,i)=>({x:i*(W-20)/(data.length-1)+10,y:H-14-(((v-mn)/rng)*(H-28)+4)}));
    const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,color+"44");gr.addColorStop(1,color+"00");
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,H-4);ctx.lineTo(pts[0].x,H-4);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.lineCap="round";ctx.stroke();
    const l=pts[pts.length-1];
    ctx.beginPath();ctx.arc(l.x,l.y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(l.x,l.y,6,0,Math.PI*2);ctx.strokeStyle=color+"55";ctx.lineWidth=2;ctx.stroke();
    ctx.font="500 7.5px 'JetBrains Mono',monospace";ctx.fillStyle="#3C4F70";ctx.textAlign="center";
    const step=Math.round((labels.length-1)/3);
    [0,step,step*2,labels.length-1].forEach(i=>{if(labels[i]&&pts[i])ctx.fillText(labels[i],pts[i].x,H-1);});
  },60);
}
function calcSim(){
  const{costo,markup,infl,meses}=S.sim;
  const p0=costo*(1+markup/100),cF=costo*Math.pow(1+infl/100,meses);
  const m0=(p0-costo)/p0*100,mF=(p0-cF)/p0*100,pN=cF/(1-markup/100);
  return{p0,cF,m0,mF,pN,adj:(pN-p0)/p0*100,loss:m0-mF};
}

const SYS=`Asesor económico PyMEs argentinas, La Plata, FCE-UNLP. Plataforma PyMEdata. Marco Fernando Toledo: Canal Precio(inflación→costos→márgenes), Canal Crédito(tasas→financiamiento), Canal Demanda(salarios→consumo), Canal Cambiario(TC→insumos). Datos: IPC mar/26:3.4%/mes·32.6% i.a. TC:$1.429→$1.707 dic/26. TAMAR:30.9%→24.2% TNA dic/26. PIB 2026:+3.4%. Español rioplatense. Concreto, accionable. **negrita** conceptos clave.`;

function getApiKey(){ return localStorage.getItem('pymedata_apikey')||''; }
function saveApiKey(k){ k ? localStorage.setItem('pymedata_apikey',k.trim()) : localStorage.removeItem('pymedata_apikey'); }

async function callAI(u,s){
  const key = getApiKey();
  if(!key) return "⚠️ Configurá tu API Key en Mi Cuenta para usar esta función.";
  try{
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:1000,system:s,messages:[{role:"user",content:u}]})
    });
    const d = await r.json();
    if(!r.ok){
      if(r.status===401) return "⚠️ API Key inválida. Verificala en Mi Cuenta.";
      if(r.status===429) return "⚠️ Límite de uso alcanzado. Esperá un momento.";
      return "⚠️ Error: " + (d?.error?.message||r.status);
    }
    return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()||"Sin respuesta.";
  }catch(e){ return "⚠️ Error de conexión. Verificá tu red."; }
}

       <span style="font-size:15px">👤</span>
       <span>Mi Cuenta</span>
       <span class="plan-chip" style="background:${pc}20;border:1px solid ${pc}40;color:${pc};margin-left:2px">${planNombre(plan)}</span>
     </div>`;
  document.getElementById("scr").innerHTML = (PG[S.sc]||pgInicio)();
  document.getElementById("nav").innerHTML = NAV.map(it=>`<button class="nb ${S.sc===it.id?"on":""}" onclick="navTo('${it.id}')"><span class="nb-i">${it.e}</span><span class="nb-l">${it.l}</span></button>`).join("");
  if(S.sc==="inicio"){const sr=SER[S.cs];drawChart("mc",sr.d,sr.c,sr.lbl);}
}

/* ══ INIT ══ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
initAuth();
</script>
